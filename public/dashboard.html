<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeShield — WAF Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'Inter', monospace; }
    #map { height: 100%; filter: brightness(0.85) saturate(0.7); }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: rgba(239,68,68,0.2); color: #ef4444; border-color: #ef4444; }
    .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .attack-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 9999px; }
    .feed-item { border-left: 3px solid; animation: fadeIn 0.4s ease; }
    .panel { display: none; }
    .panel.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; } }
    input, select { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; }
    input:focus { outline: none; border-color: #ef4444; }
    .btn-red { background: #ef4444; color: white; transition: opacity 0.2s; }
    .btn-red:hover { opacity: 0.85; }
    .btn-ghost { background: rgba(255,255,255,0.08); color: #e2e8f0; transition: background 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.15); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen flex flex-col h-screen overflow-hidden">

  <!-- Header -->
  <header class="px-6 py-3 flex items-center justify-between border-b border-white/10 shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-red-600 flex items-center justify-center font-bold text-sm">ES</div>
      <span class="font-semibold text-lg tracking-tight">EdgeShield</span>
      <span class="text-xs text-slate-500 font-mono">Distributed WAF</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex gap-1 border border-white/10 rounded p-0.5">
        <button onclick="switchTab('map')" id="tab-map" class="tab-btn active text-xs px-3 py-1 rounded border border-transparent">Threat Map</button>
        <button onclick="switchTab('admin')" id="tab-admin" class="tab-btn text-xs px-3 py-1 rounded border border-transparent">Admin Panel</button>
      </div>
      <div class="flex items-center gap-2 text-xs">
        <span id="ws-status" class="w-2 h-2 rounded-full bg-yellow-500"></span>
        <span id="ws-label" class="text-slate-400">Connecting...</span>
      </div>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="grid grid-cols-4 gap-3 px-6 py-3 border-b border-white/10 shrink-0">
    <div class="stat-card rounded p-3">
      <div class="text-xs text-slate-400 mb-1">Requests / min</div>
      <div id="stat-rpm" class="text-xl font-bold tabular-nums">0</div>
    </div>
    <div class="stat-card rounded p-3">
      <div class="text-xs text-slate-400 mb-1">Blocked (session)</div>
      <div id="stat-blocked" class="text-xl font-bold text-red-400 tabular-nums">0</div>
    </div>
    <div class="stat-card rounded p-3">
      <div class="text-xs text-slate-400 mb-1">Challenged</div>
      <div id="stat-challenged" class="text-xl font-bold text-yellow-400 tabular-nums">0</div>
    </div>
    <div class="stat-card rounded p-3">
      <div class="text-xs text-slate-400 mb-1">Avg Threat Score</div>
      <div id="stat-avg-score" class="text-xl font-bold tabular-nums">0.00</div>
    </div>
  </div>

  <!-- Threat Map Panel -->
  <div id="panel-map" class="panel active flex-1 overflow-hidden">
    <div id="map" class="flex-1"></div>
    <div class="w-72 flex flex-col border-l border-white/10 overflow-hidden">
      <div class="px-4 py-2 text-xs font-semibold text-slate-400 border-b border-white/10 flex items-center justify-between">
        LIVE FEED
        <span id="feed-count" class="bg-slate-700 rounded px-1.5 py-0.5 tabular-nums">0</span>
      </div>
      <div id="feed" class="flex-1 overflow-y-auto text-xs px-2 py-2 space-y-1.5"></div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="panel-admin" class="panel flex-1 overflow-hidden">

    <!-- API Key gate -->
    <div id="admin-gate" class="w-full flex items-center justify-center">
      <div class="stat-card rounded-lg p-6 w-80 space-y-4">
        <div class="text-sm font-semibold">Admin Access</div>
        <input id="admin-key-input" type="password" placeholder="X-Admin-Key" class="w-full rounded px-3 py-2 text-sm" />
        <button onclick="unlockAdmin()" class="btn-red w-full py-2 rounded text-sm font-semibold">Unlock</button>
        <p id="admin-error" class="text-red-400 text-xs hidden">Invalid API key</p>
      </div>
    </div>

    <!-- Admin content -->
    <div id="admin-content" class="hidden w-full p-6 grid grid-cols-2 gap-4 overflow-auto content-start">

      <!-- Stats -->
      <div class="stat-card rounded-lg p-4 space-y-3">
        <div class="text-xs font-semibold text-slate-400 flex items-center justify-between">
          SERVER STATS
          <button onclick="loadAdminStats()" class="btn-ghost text-xs px-2 py-0.5 rounded">Refresh</button>
        </div>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-slate-400">Total Requests</span><span id="as-total" class="font-bold">—</span></div>
          <div class="flex justify-between"><span class="text-slate-400">Blocked</span><span id="as-blocked" class="font-bold text-red-400">—</span></div>
          <div class="flex justify-between"><span class="text-slate-400">Challenged</span><span id="as-challenged" class="font-bold text-yellow-400">—</span></div>
          <div class="flex justify-between"><span class="text-slate-400">Block Rate</span><span id="as-rate" class="font-bold">—</span></div>
        </div>
      </div>

      <!-- Rules -->
      <div class="stat-card rounded-lg p-4 space-y-3 overflow-hidden flex flex-col" style="max-height:280px">
        <div class="text-xs font-semibold text-slate-400 flex items-center justify-between shrink-0">
          WAF RULES
          <button onclick="loadRules()" class="btn-ghost text-xs px-2 py-0.5 rounded">Reload</button>
        </div>
        <div id="rules-list" class="space-y-0.5 overflow-y-auto flex-1 text-xs"></div>
      </div>

      <!-- Blocklist -->
      <div class="stat-card rounded-lg p-4 space-y-3 col-span-2 flex flex-col overflow-hidden" style="max-height:300px">
        <div class="text-xs font-semibold text-slate-400 shrink-0">IP BLOCKLIST</div>
        <div class="flex gap-2 shrink-0">
          <input id="block-ip" type="text" placeholder="IP address  e.g. 1.2.3.4" class="flex-1 rounded px-3 py-1.5 text-sm" />
          <input id="block-reason" type="text" placeholder="Reason (optional)" class="flex-1 rounded px-3 py-1.5 text-sm" />
          <button onclick="blockIp()" class="btn-red px-4 py-1.5 rounded text-sm font-semibold">Block IP</button>
        </div>
        <div class="overflow-y-auto flex-1">
          <table class="w-full text-xs">
            <thead><tr class="text-slate-500 text-left border-b border-white/10">
              <th class="pb-1 font-medium">IP Address</th>
              <th class="pb-1 font-medium">Action</th>
            </tr></thead>
            <tbody id="blocklist-body"></tbody>
          </table>
          <p id="blocklist-empty" class="text-slate-500 text-xs mt-2">No IPs blocked.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Tab switching ────────────────────────────────────────────────────────
    function switchTab(tab) {
      ['map','admin'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
      });
      if (tab === 'admin' && adminKey) { loadAdminStats(); loadRules(); loadBlocklist(); }
    }

    // ── Map ──────────────────────────────────────────────────────────────────
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const COLORS = { sqli:'#ef4444', xss:'#f97316', traversal:'#a855f7', cmdi:'#ec4899', ssrf:'#06b6d4', scanner:'#facc15', anomaly:'#94a3b8' };

    function addMarker(ev) {
      if (!ev.lat || !ev.lon) return;
      const color = COLORS[ev.attackType] ?? '#94a3b8';
      const c = L.circleMarker([ev.lat, ev.lon], { radius: 6 + ev.score * 14, color, fillColor: color, fillOpacity: 0.7, weight: 1 }).addTo(map);
      c.bindPopup(`<strong>${ev.attackType.toUpperCase()}</strong><br>Score: ${ev.score.toFixed(3)}<br>IP: ${ev.ip}<br>Country: ${ev.country}<br>Decision: ${ev.decision}`);
      setTimeout(() => map.removeLayer(c), 8000);
    }

    // ── Stats ────────────────────────────────────────────────────────────────
    let stats = { blocked:0, challenged:0, scores:[] }, eventCount=0, recentRequests=[];
    function updateStats(ev) {
      eventCount++;
      recentRequests.push(Date.now());
      recentRequests = recentRequests.filter(t => Date.now()-t < 60000);
      if (ev.decision==='block') stats.blocked++;
      if (ev.decision==='challenge') stats.challenged++;
      stats.scores.push(ev.score);
      if (stats.scores.length > 100) stats.scores.shift();
      document.getElementById('stat-rpm').textContent = recentRequests.length;
      document.getElementById('stat-blocked').textContent = stats.blocked;
      document.getElementById('stat-challenged').textContent = stats.challenged;
      const avg = stats.scores.reduce((a,b)=>a+b,0)/stats.scores.length;
      document.getElementById('stat-avg-score').textContent = avg.toFixed(3);
      document.getElementById('feed-count').textContent = eventCount;
    }

    // ── Live feed ────────────────────────────────────────────────────────────
    function addFeedItem(ev) {
      const color = COLORS[ev.attackType] ?? '#94a3b8';
      const dColor = ev.decision==='block'?'#ef4444':ev.decision==='challenge'?'#facc15':'#94a3b8';
      const el = document.createElement('div');
      el.className = 'feed-item rounded p-2 bg-white/5';
      el.style.borderColor = color;
      el.innerHTML = `<div class="flex justify-between items-center"><span class="attack-badge" style="background:${color}33;color:${color}">${ev.attackType}</span><span class="text-slate-500">${ev.country}</span></div><div class="mt-1 flex justify-between text-slate-400"><span>Score: <span class="font-bold text-white">${ev.score.toFixed(3)}</span></span><span style="color:${dColor}">${ev.decision.toUpperCase()}</span></div>`;
      const feed = document.getElementById('feed');
      feed.prepend(el);
      if (feed.children.length > 40) feed.lastChild.remove();
    }

    // ── WebSocket ────────────────────────────────────────────────────────────
    function connect() {
      const proto = location.protocol==='https:'?'wss':'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws/threats`);
      const dot = document.getElementById('ws-status'), lbl = document.getElementById('ws-label');
      ws.onopen = () => { dot.className='w-2 h-2 rounded-full bg-green-500'; lbl.textContent='Connected'; };
      ws.onmessage = e => { const ev=JSON.parse(e.data); addMarker(ev); addFeedItem(ev); updateStats(ev); };
      ws.onclose = () => { dot.className='w-2 h-2 rounded-full bg-red-500'; lbl.textContent='Reconnecting...'; setTimeout(connect,3000); };
    }
    connect();

    // ── Admin ────────────────────────────────────────────────────────────────
    let adminKey = '';

    async function adminFetch(path, opts={}) {
      const res = await fetch(path, { ...opts, headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json', ...(opts.headers||{}) } });
      return res.json();
    }

    async function unlockAdmin() {
      adminKey = document.getElementById('admin-key-input').value.trim();
      const data = await adminFetch('/admin/stats').catch(() => null);
      if (!data || data.error) {
        document.getElementById('admin-error').classList.remove('hidden');
        adminKey = ''; return;
      }
      document.getElementById('admin-gate').classList.add('hidden');
      document.getElementById('admin-content').classList.remove('hidden');
      renderStats(data); loadRules(); loadBlocklist();
    }

    async function loadAdminStats() { renderStats(await adminFetch('/admin/stats')); }

    function renderStats(d) {
      document.getElementById('as-total').textContent = d.totalRequests ?? '—';
      document.getElementById('as-blocked').textContent = d.blocked ?? '—';
      document.getElementById('as-challenged').textContent = d.challenged ?? '—';
      document.getElementById('as-rate').textContent = d.blockRate!=null ? (d.blockRate*100).toFixed(1)+'%' : '—';
    }

    async function loadRules() {
      const rules = await adminFetch('/admin/rules');
      const c = document.getElementById('rules-list');
      if (!Array.isArray(rules)) { c.innerHTML='<p class="text-slate-500">Failed to load.</p>'; return; }
      c.innerHTML = rules.map(r=>`<div class="flex items-center justify-between py-1 border-b border-white/5"><div><span class="font-mono text-slate-500">${r.id}</span><span class="ml-2 text-slate-300">${r.name}</span></div><span class="px-2 py-0.5 rounded text-xs" style="background:${r.action==='block'?'#ef444422':'#facc1522'};color:${r.action==='block'?'#ef4444':'#facc15'}">${r.action}</span></div>`).join('');
    }

    async function loadBlocklist() {
      const data = await adminFetch('/admin/blocklist');
      const ips = data.ips || [];
      const tbody = document.getElementById('blocklist-body');
      document.getElementById('blocklist-empty').style.display = ips.length ? 'none' : '';
      tbody.innerHTML = ips.map(ip=>`<tr class="border-b border-white/5"><td class="py-1.5 font-mono text-slate-300">${ip}</td><td class="py-1.5"><button onclick="unblockIp('${ip}')" class="text-red-400 hover:text-red-300 text-xs">Unblock</button></td></tr>`).join('');
    }

    async function blockIp() {
      const ip = document.getElementById('block-ip').value.trim();
      const reason = document.getElementById('block-reason').value.trim();
      if (!ip) return;
      await adminFetch('/admin/blocklist', { method:'POST', body:JSON.stringify({ip, reason:reason||'manual'}) });
      document.getElementById('block-ip').value='';
      document.getElementById('block-reason').value='';
      loadBlocklist();
    }

    async function unblockIp(ip) {
      await adminFetch(`/admin/blocklist/${ip}`, { method:'DELETE' });
      loadBlocklist();
    }

    document.getElementById('admin-key-input').addEventListener('keydown', e => { if(e.key==='Enter') unlockAdmin(); });
    document.getElementById('block-ip').addEventListener('keydown', e => { if(e.key==='Enter') blockIp(); });

    // ── Simulate on localhost ────────────────────────────────────────────────
    if (location.hostname === 'localhost') {
      const SAMPLE = [
        {ip:'1.2.3.4',country:'CN',lat:39.9,lon:116.4,attackType:'sqli',score:0.92,decision:'block'},
        {ip:'5.6.7.8',country:'RU',lat:55.7,lon:37.6,attackType:'scanner',score:0.65,decision:'challenge'},
        {ip:'9.10.11.12',country:'US',lat:37.8,lon:-122.4,attackType:'xss',score:0.78,decision:'block'},
        {ip:'13.14.15.16',country:'DE',lat:52.5,lon:13.4,attackType:'traversal',score:0.55,decision:'log'},
      ];
      setInterval(() => {
        const ev = {...SAMPLE[Math.floor(Math.random()*SAMPLE.length)], timestamp:Date.now(), requestId:crypto.randomUUID()};
        addMarker(ev); addFeedItem(ev); updateStats(ev);
      }, 1500);
    }
  </script>
</body>
</html>
