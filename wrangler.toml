name = "edgeshield"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
THREAT_SCORE_BLOCK_THRESHOLD = "0.8"
THREAT_SCORE_CHALLENGE_THRESHOLD = "0.5"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "100"
# ADMIN_API_KEY — set via: npx wrangler secret put ADMIN_API_KEY

[[kv_namespaces]]
binding = "WAF_RULES"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[durable_objects.bindings]]
name = "THREAT_EVENTS"
class_name = "ThreatEventBus"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter", "ThreatEventBus"]
